<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Basket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Your Basket</h1>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Book Name</th>
            <th>Quantity</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${basket}">
            <td th:text="${item.bookName}"></td>
            <td th:text="${item.quantity}"></td>
        </tr>
        <tr th:unless="${basket != null && !basket.isEmpty()}">
            <td colspan="2">Your basket is empty</td>
        </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <form th:action="@{/clients/basket/submit}" method="post" style="display:inline;" th:if="${basket != null && !basket.isEmpty()}">
            <button type="submit" class="btn btn-success" onclick="return confirm('Are you sure you want to submit your order?');">Submit Order</button>
        </form>
        <form th:action="@{/clients/basket/clear}" method="post" style="display:inline;" th:if="${basket != null && !basket.isEmpty()}">
            <button type="submit" class="btn btn-danger" onclick="return confirm('Are you sure you want to clear your basket?');">Clear Basket</button>
        </form>
        <a th:href="@{/books}" class="btn btn-secondary">Back to Books</a>
    </div>
</div>
</body>
</html>
