<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title th:text="${book.name}">Book Details</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .book-details {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background-color: #f9f9f9;
    }
    .book-details h2 {
      margin-top: 0;
    }
    .book-details p {
      margin: 10px 0;
    }
    .btn {
      padding: 5px 10px;
      margin-right: 10px;
      text-decoration: none;
      color: white;
      border-radius: 3px;
    }
    .btn-warning {
      background-color: #f0ad4e;
    }
    .btn-danger {
      background-color: #d9534f;
    }
    .btn-secondary {
      background-color: #6c757d;
    }
  </style>
</head>
<body>
<div class="book-details">
  <h2 th:text="${book.name}">Book Name</h2>
  <p><strong>Genre:</strong> <span th:text="${book.genre}"></span></p>
  <p><strong>Age Group:</strong> <span th:text="${book.ageGroup}"></span></p>
  <p><strong>Price:</strong> <span th:text="${book.price}"></span></p>
  <p><strong>Publication Date:</strong> <span th:text="${book.publicationDate}"></span></p>
  <p><strong>Author:</strong> <span th:text="${book.author}"></span></p>
  <p><strong>Pages:</strong> <span th:text="${book.pages}"></span></p>
  <p><strong>Characteristics:</strong> <span th:text="${book.characteristics}"></span></p>
  <p><strong>Description:</strong> <span th:text="${book.description}"></span></p>
  <p><strong>Language:</strong> <span th:text="${book.language}"></span></p>

  <div class="mt-3">
    <a th:href="@{/books}" class="btn btn-secondary return-link">Return to Books</a>

    <!-- Кнопки для сотрудников -->
    <div sec:authorize="hasRole('EMPLOYEE')">
      <a th:href="@{/books/edit/{name}(name=${book.name})}" class="btn btn-warning">Edit</a>
      <form th:action="@{/books/delete/{name}(name=${book.name})}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-danger">Delete</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
