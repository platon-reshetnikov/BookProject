<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${book.name} ? 'Edit Book' : 'Add Book'">Book Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <h1 th:text="${book.name} ? 'Edit Book' : 'Add Book'"></h1>

    <form th:action="${book.name} ? @{/books/update} : @{/books/add}" th:object="${book}" method="post" class="needs-validation" novalidate>
        <input type="hidden" th:field="*{name}" th:if="${book.name}" />
        <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" th:field="*{name}" th:disabled="${book.name}" required />
            <div class="text-danger" th:errors="*{name}"></div>
        </div>
        <div class="mb-3">
            <label for="genre" class="form-label">Genre</label>
            <input type="text" class="form-control" id="genre" th:field="*{genre}" required />
            <div class="text-danger" th:errors="*{genre}"></div>
        </div>
        <div class="mb-3">
            <label for="ageGroup" class="form-label">Age Group</label>
            <select class="form-select" id="ageGroup" th:field="*{ageGroup}" required>
                <option th:each="age : ${T(com.epam.rd.autocode.spring.project.model.enums.AgeGroup).values()}"
                        th:value="${age}" th:text="${age}"></option>
            </select>
            <div class="text-danger" th:errors="*{ageGroup}"></div>
        </div>
        <div class="mb-3">
            <label for="price" class="form-label">Price</label>
            <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}" required />
            <div class="text-danger" th:errors="*{price}"></div>
        </div>
        <div class="mb-3">
            <label for="publicationDate" class="form-label">Publication Date</label>
            <input type="date" class="form-control" id="publicationDate" th:field="*{publicationDate}" required />

            <!-- Show validation error messages if there are any -->
            <div th:if="${#fields.hasErrors('publicationDate')}" class="text-danger">
                <small th:errors="*{publicationDate}"></small>
            </div>
        </div>
        <div class="mb-3">
            <label for="author" class="form-label">Author</label>
            <input type="text" class="form-control" id="author" th:field="*{author}" required />
            <div class="text-danger" th:errors="*{author}"></div>
        </div>
        <div class="mb-3">
            <label for="pages" class="form-label">Pages</label>
            <input type="number" class="form-control" id="pages" th:field="*{pages}" required />
            <div class="text-danger" th:errors="*{pages}"></div>
        </div>
        <div class="mb-3">
            <label for="characteristics" class="form-label">Characteristics</label>
            <input type="text" class="form-control" id="characteristics" th:field="*{characteristics}" required />
            <div class="text-danger" th:errors="*{characteristics}"></div>
        </div>
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" th:field="*{description}" required></textarea>
            <div class="text-danger" th:errors="*{description}"></div>
        </div>
        <div class="mb-3">
            <label for="language" class="form-label">Language</label>
            <select class="form-select" id="language" th:field="*{language}" required>
                <option th:each="lang : ${T(com.epam.rd.autocode.spring.project.model.enums.Language).values()}"
                        th:value="${lang}" th:text="${lang}"></option>
            </select>
            <div class="text-danger" th:errors="*{language}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
        <a th:href="@{/books}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
