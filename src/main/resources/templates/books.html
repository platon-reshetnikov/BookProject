<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Books</title>
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
    }
    table, th, td {
      border: 1px solid black;
    }
    th, td {
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    .btn {
      padding: 5px 10px;
      margin-right: 10px;
      text-decoration: none;
      color: white;
      border-radius: 3px;
    }
    .btn-success {
      background-color: #28a745;
    }
    .btn-primary {
      background-color: #007bff;
    }
  </style>
</head>
<body>
<h1>Book List</h1>

<div style="margin-bottom: 20px;" sec:authorize="hasRole('EMPLOYEE')">
  <a th:href="@{/books/add}" class="btn btn-success">Add Book</a>
  <a th:href="@{/orders}" class="btn btn-primary">View Orders</a>
  <a th:href="@{/clients/manage}" class="btn btn-primary">Manage Clients</a>
  <a th:href="@{/clients/list}" class="btn btn-primary">View Client List</a>
</div>

<div style="margin-bottom: 20px;" sec:authorize="hasRole('CLIENT')">
  <a th:href="@{/clients/basket}" class="btn btn-primary">View Basket</a>
</div>

<div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
<div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

<table>
  <thead>
  <tr>
    <th>Name</th>
    <th>Author</th>
    <th sec:authorize="hasRole('CLIENT')">Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="book : ${books}">
    <td>
      <a th:href="@{/books/{name}(name=${book.name})}" th:text="${book.name}"></a>
    </td>
    <td th:text="${book.author}"></td>
    <td sec:authorize="hasRole('CLIENT')">
      <form th:action="@{/clients/basket/add/{bookName}(bookName=${book.name})}" method="post" style="display:inline;">
        <input type="hidden" name="quantity" value="1"/>
        <button type="submit" class="btn btn-success btn-sm">Add to Basket</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>

<div style="margin-top: 20px;">
  <a th:href="@{/logout}" class="logout-link">Logout</a>
  <a th:href="@{/profile}">View Profile</a>
</div>
</body>
</html>
