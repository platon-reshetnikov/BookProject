<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Books</title>
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
    }
    table, th, td {
      border: 1px solid black;
    }
    th, td {
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    .btn {
      padding: 5px 10px;
      margin-right: 10px;
      text-decoration: none;
      color: white;
      border-radius: 3px;
      background-color: #28a745; /* Зеленый цвет для кнопки Add */
    }
  </style>
</head>
<body>
<h1>Book List</h1>

<!-- Кнопка Add Book для сотрудников -->
<div sec:authorize="hasRole('EMPLOYEE')" style="margin-bottom: 20px;">
  <a th:href="@{/books/add}" class="btn">Add Book</a>
</div>

<table>
  <thead>
  <tr>
    <th>Name</th>
    <th>Author</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="book : ${books}">
    <td>
      <a th:href="@{/books/{name}(name=${book.name})}" th:text="${book.name}"></a>
    </td>
    <td th:text="${book.author}"></td>
  </tr>
  </tbody>
</table>

<div style="margin-top: 20px;">
  <a th:href="@{/logout}" class="logout-link">Logout</a>
  <a th:href="@{/profile}">View Profile</a>
</div>
</body>
</html>
