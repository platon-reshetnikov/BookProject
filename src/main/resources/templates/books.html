<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <title>Books</title>
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
    }
    table, th, td {
      border: 1px solid black;
    }
    th, td {
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
    }
    .btn {
      padding: 5px 10px;
      margin-right: 10px;
      text-decoration: none;
      color: white;
      border-radius: 3px;
    }
    .btn-success {
      background-color: #28a745;
    }
    .btn-primary {
      background-color: #007bff;
    }
  </style>
</head>
<body>
<h1>Book List</h1>

<div style="margin-bottom: 20px;" sec:authorize="hasRole('EMPLOYEE')">
  <a th:href="@{/books/add}" class="btn btn-success">Add Book</a>
  <a th:href="@{/orders}" class="btn btn-primary">View Orders</a>
  <a th:href="@{/clients/manage}" class="btn btn-primary">Manage Clients</a>
</div>

<table>
  <thead>
  <tr>
    <th>Name</th>
    <th>Author</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="book : ${books}">
    <td>
      <a th:href="@{/books/{name}(name=${book.name})}" th:text="${book.name}"></a>
    </td>
    <td th:text="${book.author}"></td>
  </tr>
  </tbody>
</table>

<div style="margin-top: 20px;">
  <a th:href="@{/logout}" class="logout-link">Logout</a>
  <a th:href="@{/profile}">View Profile</a>
</div>
</body>
</html>
