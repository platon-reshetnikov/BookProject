<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Clients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 8px;
            text-align: left;
            border: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Clients</h1>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Email</th>
            <th>Name</th>
            <th>Balance</th>
            <th>Blocked</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="client : ${clients}">
            <td th:text="${client.email}"></td>
            <td th:text="${client.name}"></td>
            <td th:text="${client.balance}"></td>
            <td th:text="${clientBlockedStatus[client.email]} ? 'Yes' : 'No'"></td>
            <td>
                <form th:action="@{/clients/block/{email}(email=${client.email})}" method="post" style="display:inline;" th:unless="${clientBlockedStatus[client.email]}">
                    <button type="submit" class="btn btn-danger btn-sm">Block</button>
                </form>
                <form th:action="@{/clients/unblock/{email}(email=${client.email})}" method="post" style="display:inline;" th:if="${clientBlockedStatus[client.email]}">
                    <button type="submit" class="btn btn-success btn-sm">Unblock</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="mt-3">
        <a th:href="@{/books}" class="btn btn-secondary">Back to Books</a>
    </div>
</div>
</body>
</html>
