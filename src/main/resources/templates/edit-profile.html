<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
  <h2>Edit Your Profile</h2>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <!-- Debugging -->
  <p>User Type: <span th:text="${userType}"></span></p>

  <form th:action="@{/profile/edit}" th:object="${userWrapper}" method="post" class="needs-validation" novalidate>
    <input type="hidden" name="userType" th:value="${userType}" />

    <div th:if="${userType == 'client'}">
      <div class="mb-3">
        <label for="client-email" class="form-label">Email</label>
        <input type="email" class="form-control" id="client-email" th:field="*{clientDTO.email}" readonly />
        <div class="text-danger" th:errors="*{clientDTO.email}"></div>
      </div>
      <div class="mb-3">
        <label for="client-name" class="form-label">Name</label>
        <input type="text" class="form-control" id="client-name" th:field="*{clientDTO.name}" required />
        <div class="text-danger" th:errors="*{clientDTO.name}"></div>
      </div>
      <div class="mb-3">
        <label for="client-password" class="form-label">Password</label>
        <input type="password" class="form-control" id="client-password" th:field="*{clientDTO.password}" required />
        <div class="text-danger" th:errors="*{clientDTO.password}"></div>
      </div>
      <div class="mb-3">
        <label for="client-balance" class="form-label">Balance</label>
        <input type="number" step="0.01" class="form-control" id="client-balance" th:field="*{clientDTO.balance}" required />
        <div class="text-danger" th:errors="*{clientDTO.balance}"></div>
      </div>
    </div>

    <div th:if="${userType == 'employee'}">
      <div class="mb-3">
        <label for="employee-email" class="form-label">Email</label>
        <input type="email" class="form-control" id="employee-email" th:field="*{employeeDTO.email}" readonly />
        <div class="text-danger" th:errors="*{employeeDTO.email}"></div>
      </div>
      <div class="mb-3">
        <label for="employee-name" class="form-label">Name</label>
        <input type="text" class="form-control" id="employee-name" th:field="*{employeeDTO.name}" required />
        <div class="text-danger" th:errors="*{employeeDTO.name}"></div>
      </div>
      <div class="mb-3">
        <label for="employee-password" class="form-label">Password</label>
        <input type="password" class="form-control" id="employee-password" th:field="*{employeeDTO.password}" required />
        <div class="text-danger" th:errors="*{employeeDTO.password}"></div>
      </div>
      <div class="mb-3">
        <label for="employee-phone" class="form-label">Phone</label>
        <input type="text" class="form-control" id="employee-phone" th:field="*{employeeDTO.phone}" required />
        <div class="text-danger" th:errors="*{employeeDTO.phone}"></div>
      </div>
      <div class="mb-3">
        <label for="employee-birthDate" class="form-label">Birth Date</label>
        <input type="date" class="form-control" id="employee-birthDate"
               th:field="*{employeeDTO.birthDate}" required
               th:value="${formattedBirthDate}" />
        <div class="text-danger" th:errors="*{employeeDTO.birthDate}"></div>
      </div>
    </div>

    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a th:href="@{/profile}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
</body>
</html>
