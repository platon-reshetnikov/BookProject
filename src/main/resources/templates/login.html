<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{login.title}">Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .login-container h2 {
            text-align: center;
            color: #333333;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            font-weight: 500;
            color: #444444;
        }
        .form-group input {
            border-radius: 5px;
            border: 1px solid #ced4da;
            padding: 0.5rem;
        }
        .form-group input:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
            outline: none;
        }
        .error-message {
            color: #dc3545;
            text-align: center;
            margin-top: 1rem;
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
            padding: 0.5rem 1rem;
            width: 100%;
            transition: background-color 0.3s;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .btn-secondary {
            background-color: #6c757d;
            border: none;
            padding: 0.5rem 1rem;
            width: 100%;
            transition: background-color 0.3s;
        }
        .btn-secondary:hover {
            background-color: #5a6268;
        }
        .button-group {
            display: flex;
            gap: 1rem;
        }
        .language-selector {
            margin-bottom: 1rem;
            text-align: center;
        }
        .language-selector a {
            margin: 0 0.5rem;
            text-decoration: none;
            color: #007bff;
        }
        .language-selector a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="language-selector">
        <a th:href="@{/login(lang='en')}" th:text="#{lang.english}">English</a>
        <a th:href="@{/login(lang='de')}" th:text="#{lang.german}">Deutsch</a>
    </div>

    <h2 th:text="#{welcome.message}">Welcome</h2>

    <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
        <div class="form-group">
            <label th:text="#{username}" for="username" class="form-label"></label>
            <input type="text" id="username" name="username" class="form-control" required>
            <div class="invalid-feedback" th:text="#{validation.required}"></div>
        </div>
        <div class="form-group">
            <label th:text="#{password}" for="password" class="form-label"></label>
            <input type="password" id="password" name="password" class="form-control" required>
            <div class="invalid-feedback" th:text="#{validation.required}"></div>
        </div>
        <div th:if="${param.error}" class="error-message">
            <p th:text="#{error.message}"></p>
        </div>
        <div class="button-group">
            <button type="submit" class="btn btn-primary" th:text="#{login}"></button>
            <a th:href="@{/register}" class="btn btn-secondary" th:text="#{register}"></a>
        </div>
    </form>
</div>
</body>
</html>
