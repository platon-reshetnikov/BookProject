<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Orders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 8px;
      text-align: left;
      border: 1px solid #ddd;
    }
    th {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Orders</h1>

  <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
  <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

  <table class="table table-striped">
    <thead>
    <tr>
      <th>Client Email</th>
      <th>Employee Email</th>
      <th>Order Date</th>
      <th>Price</th>
      <th>Books</th>
      <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
      <td th:text="${order.clientEmail}"></td>
      <td th:text="${order.employeeEmail} ?: 'Not assigned'"></td>
      <td th:text="${order.orderDate}"></td>
      <td th:text="${order.price}"></td>
      <td>
        <ul>
          <li th:each="item : ${order.bookItems}" th:text="${item.bookName} + ' (Qty: ' + ${item.quantity} + ')'"></li>
        </ul>
      </td>
      <td>
        <form th:action="@{/orders/confirm/{id}(id=${order.id})}" method="post" style="display:inline;" th:if="${order.employeeEmail == null}">
          <button type="submit" class="btn btn-success btn-sm">Confirm</button>
        </form>
      </td>
    </tr>
    </tbody>
  </table>

  <div class="mt-3">
    <a th:href="@{/books}" class="btn btn-secondary">Back to Books</a>
  </div>
</div>
</body>
</html>
