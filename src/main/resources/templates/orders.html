<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Orders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 8px;
      text-align: left;
      border: 1px solid #ddd;
    }
    th {
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Orders</h1>

  <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
  <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

  <table class="table table-striped">
    <thead>
    <tr>
      <th>Client Email</th>
      <th>Order Date</th>
      <th>Total Price</th>
      <th>Books</th>
      <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
      <td th:text="${order.clientEmail}"></td>
      <td th:text="${order.orderDate} ?: 'N/A'"></td>
      <td th:text="${#numbers.formatDecimal(order.price, 2, 2)}"></td>
      <td>
        <ul>
          <li th:each="item : ${order.bookItems}" th:text="${item.bookName} + ' - Price: ' + ${#numbers.formatDecimal(#service.getBookPrice(item.bookName.trim()), 2, 2)}"></li>
        </ul>
        <span th:unless="${order.bookItems != null && !order.bookItems.isEmpty()}" th:text="'No books in order'"></span>
      </td>
      <td>
        <form th:action="@{/orders/confirm}" method="post" style="display:inline;" th:if="${order.employeeEmail == null}">
          <input type="hidden" name="clientEmail" th:value="${order.clientEmail}"/>
          <input type="hidden" name="orderDate" th:value="${order.orderDate != null ? order.orderDate.toString() : LocalDateTime.now().toString()}"/>
          <select name="employeeEmail" class="form-select" style="display:inline; width: auto;" required>
            <option value="">Select Employee</option>
            <option th:each="employee : ${employees}" th:value="${employee.email}" th:text="${employee.email}"></option>
          </select>
          <button type="submit" class="btn btn-success btn-sm">Confirm</button>
        </form>
        <span th:if="${order.employeeEmail != null}" th:text="'Assigned to ' + ${order.employeeEmail}"></span>
      </td>
    </tr>
    <tr th:unless="${orders != null && !orders.isEmpty()}">
      <td colspan="5">No orders found</td>
    </tr>
    </tbody>
  </table>

  <div class="mt-3">
    <a th:href="@{/books}" class="btn btn-secondary">Back to Books</a>
  </div>
</div>
</body>
</html>
