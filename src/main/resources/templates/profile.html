<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <link rel="stylesheet" href="/css/styles.css"> <!-- Optional: Add custom styles -->
</head>
<body>
<h2>Your Profile</h2>

<div th:if="${user != null}">
  <p><strong>Name:</strong> <span th:text="${user.name}"></span></p>
  <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>

  <!-- Display additional fields for clients -->
  <div th:if="${user instanceof T(com.epam.rd.autocode.spring.project.model.Client)}">
    <p><strong>Balance:</strong> <span th:text="${user.balance}"></span></p>
  </div>

  <!-- Display additional fields for employees -->
  <div th:if="${user instanceof T(com.epam.rd.autocode.spring.project.model.Employee)}">
    <p><strong>Phone:</strong> <span th:text="${user.phone}"></span></p>
    <p><strong>Birth Date:</strong> <span th:text="${user.birthDate}"></span></p>
  </div>

  <a th:href="@{/profile/edit}">Edit Profile</a>
</div>

<a th:href="@{/books}">Back to Books</a>
</body>
</html>
