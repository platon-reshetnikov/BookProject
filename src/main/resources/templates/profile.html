<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .profile-details {
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background-color: #f9f9f9;
    }
  </style>
</head>
<body>
<div class="container profile-details">
  <h2>Your Profile</h2>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>
  <p><strong>Name:</strong> <span th:text="${user.name}"></span></p>
  <p th:if="${userType == 'client'}"><strong>Balance:</strong> <span th:text="${user.balance}"></span></p>
  <p th:if="${userType == 'employee'}"><strong>Phone:</strong> <span th:text="${user.phone}"></span></p>
  <p th:if="${userType == 'employee'}"><strong>Birth Date:</strong> <span th:text="${user.birthDate}"></span></p>

  <div class="mt-3">
    <a th:href="@{/profile/edit}" class="btn btn-primary">Edit Profile</a>
    <form th:action="@{/clients/delete}" method="post" style="display:inline;" sec:authorize="hasRole('CLIENT')" onsubmit="return confirm('Are you sure you want to delete your account? This action cannot be undone.');">
      <button type="submit" class="btn btn-danger">Delete Account</button>
    </form>
    <a th:href="@{/books}" class="btn btn-secondary">Back to Books</a>
  </div>
</div>
</body>
</html>
