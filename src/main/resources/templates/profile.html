<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<h2>Your Profile</h2>

<div th:if="${user != null}">
  <p><strong>Name:</strong> <span th:text="${user.name}"></span></p>
  <p><strong>Email:</strong> <span th:text="${user.email}"></span></p>

  <!-- Отладка ролей -->
  <p>Roles: <span th:text="${#authentication.authorities}"></span></p>
  <p sec:authorize="hasRole('EMPLOYEE')">You are an EMPLOYEE</p>
  <p sec:authorize="hasRole('CLIENT')">You are a CLIENT</p>

  <!-- Дополнительные поля для клиентов -->
  <div th:if="${userType == 'client'}">
    <p><strong>Balance:</strong> <span th:text="${user.balance}"></span></p>
  </div>

  <!-- Дополнительные поля для сотрудников -->
  <div th:if="${userType == 'employee'}">
    <p><strong>Phone:</strong> <span th:text="${user.phone}"></span></p>
    <p><strong>Birth Date:</strong> <span th:text="${user.birthDate}"></span></p>
  </div>

  <a th:href="@{/profile/edit}">Edit Profile</a>
</div>

<a th:href="@{/books}">Back to Books</a>
</body>
</html>
