<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{reset.password.title}">Reset Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .reset-container {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        .reset-container h2 {
            text-align: center;
            color: #333333;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            font-weight: 500;
            color: #444444;
        }
        .form-group input {
            border-radius: 5px;
            border: 1px solid #ced4da;
            padding: 0.5rem;
        }
        .form-group input:focus {
            border-color: #007bff;
            box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
            outline: none;
        }
        .success-message {
            color: #28a745;
            text-align: center;
            margin-top: 1rem;
        }
        .error-message {
            color: #dc3545;
            text-align: center;
            margin-top: 1rem;
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
            padding: 0.5rem 1rem;
            width: 100%;
            transition: background-color 0.3s;
        }
        .btn-primary:hover {
            background-color: #0056b3;
        }
        .back-to-login {
            text-align: center;
            margin-top: 1rem;
        }
        .back-to-login a {
            color: #007bff;
            text-decoration: none;
        }
        .back-to-login a:hover {
            text-decoration: underline;
        }
        .language-selector {
            margin-bottom: 1rem;
            text-align: center;
        }
        .language-selector a {
            margin: 0 0.5rem;
            text-decoration: none;
            color: #007bff;
        }
        .language-selector a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="reset-container">
    <div class="language-selector">
        <a th:href="@{/reset-password(token=${token}, lang='en')}" th:text="#{lang.english}">English</a>
        <a th:href="@{/reset-password(token=${token}, lang='de')}" th:text="#{lang.german}">Deutsch</a>
    </div>

    <h2 th:text="#{reset.password}">Reset Password</h2>
    <form th:action="@{/reset-password}" method="post" class="needs-validation" novalidate>
        <input type="hidden" name="token" th:value="${token}"/>
        <div class="form-group">
            <label th:text="#{new.password}" for="password" class="form-label"></label>
            <input type="password" id="password" name="password" class="form-control" required>
            <div class="invalid-feedback" th:text="#{validation.required}"></div>
        </div>
        <div>
            <button type="submit" class="btn btn-primary" th:text="#{reset.password.button}">Reset Password</button>
        </div>
    </form>
    <p th:if="${successMessage}" class="success-message" th:text="${successMessage}"></p>
    <p th:if="${errorMessage}" class="error-message" th:text="${errorMessage}"></p>
    <div class="back-to-login">
        <a th:href="@{/login}" th:text="#{back.to.login}">Back to Login</a>
    </div>
</div>
</body>
</html>
